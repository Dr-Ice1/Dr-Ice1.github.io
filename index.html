<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Library</title>

  <style>
    :root {
      --bg: #f7f7f5;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #111827;
      --accent-soft: #f3f4f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      max-width: 1050px;
      margin: 0 auto;
      padding: 56px 20px 28px;
    }

    header h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: -0.06em;
      line-height: 1;
    }

    header p {
      max-width: 650px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    main {
      max-width: 1050px;
      margin: 0 auto;
      padding: 20px;
    }

    .category-section {
      margin-bottom: 42px;
    }

    .category-title {
      margin: 0 0 8px;
      font-size: 1.5rem;
      letter-spacing: -0.04em;
    }

    .pdf-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      margin-top: 16px;
    }

    .pdf-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 8px 28px rgba(15, 23, 42, 0.04);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .pdf-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 36px rgba(15, 23, 42, 0.08);
    }

    .pdf-card h2 {
      margin: 0 0 8px;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
    }

    .pdf-card p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 999px;
      padding: 9px 15px;
      font-size: 0.92rem;
      font-weight: 600;
      border: 1px solid var(--accent);
    }

    a.primary {
      background: var(--accent);
      color: white;
    }

    a.secondary {
      background: white;
      color: var(--accent);
    }

    .viewer-page {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .viewer-topbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px;
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .viewer-title {
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .viewer-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    iframe {
      width: 100%;
      flex: 1;
      border: 0;
      background: white;
    }

    footer {
      max-width: 1050px;
      margin: 40px auto 0;
      padding: 24px 20px 40px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      header {
        padding-top: 36px;
      }

      .viewer-topbar {
        align-items: stretch;
      }

      .viewer-actions,
      .viewer-actions .button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script>
    const pdfs = [
      {
        title: "St. Cyril of Alexandria – Letters 1-50",
        category: "Early Fathers",
        description: "The Father of the Church – Volume 76",
        file: "pdfs/Letters 1-50 Cyril of Alexandria etc Z-Library.pdf"
      },

      {
        title: "St. Cyril of Alexandria – Letters 51-110",
        category: "Early Fathers",
        description: "The Father of the Church – Volume 77",
        file: "pdfs/Cyril of Alexandria Letters 51-110.pdf"
      },

      {
        title: "St. Basil the Great – Against Eunomius",
        category: "Cappadocian Fathers",
        description: "The Fathers of the Church – The Catholic university of America press",
        file: "pdfs/saint-basil-of-caesarea-against-eunomius-fathers-of-3.pdf"
      }
    ];

    const app = document.getElementById("app");
    const params = new URLSearchParams(window.location.search);
    const selectedPdf = params.get("pdf");

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderHome() {
      document.title = "PDF Library";

      const categories = [...new Set(pdfs.map(pdf => pdf.category))];

      app.innerHTML = `
        <header>
          <h1>Maki's PDF library</h1>
          <p>View documents directly in the browser, or download them for offline reading.</p>
        </header>

        <main>
          ${categories.map(category => `
            <section class="category-section">

              <h2 class="category-title">
                ${escapeHtml(category)}
              </h2>

              <section class="pdf-grid">
                ${pdfs
                  .filter(pdf => pdf.category === category)
                  .map((pdf) => `
                    <article class="pdf-card">
                      <h2>${escapeHtml(pdf.title)}</h2>

                      <p>${escapeHtml(pdf.description)}</p>

                      <div class="actions">
                        <a class="button primary"
                           href="?pdf=${encodeURIComponent(pdf.file)}">
                           View PDF
                        </a>

                        <a class="button secondary"
                           href="${escapeHtml(pdf.file)}"
                           download>
                           Download
                        </a>
                      </div>
                    </article>
                  `).join("")}
              </section>

            </section>
          `).join("")}
        </main>

        <footer>
          Add new PDF files inside the <strong>pdfs</strong> folder,
          then add them to the list in the script.
        </footer>
      `;
    }

    function renderViewer(file) {
      const pdf = pdfs.find((item) => item.file === file);

      if (!pdf) {
        renderHome();
        return;
      }

      document.title = `${pdf.title} · PDF Library`;

      app.innerHTML = `
        <main class="viewer-page">

          <div class="viewer-topbar">

            <div class="viewer-title">
              ${escapeHtml(pdf.title)}
            </div>

            <div class="viewer-actions">

              <a class="button secondary" href="./">
                Back
              </a>

              <a class="button primary"
                 href="${escapeHtml(pdf.file)}"
                 download>
                 Download PDF
              </a>

            </div>
          </div>

          <iframe
            src="${escapeHtml(pdf.file)}"
            title="${escapeHtml(pdf.title)}">
          </iframe>

        </main>
      `;
    }

    if (selectedPdf) {
      renderViewer(selectedPdf);
    } else {
      renderHome();
    }
  </script>
</body>
</html>
